<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VideoAI.uz</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#08090d;color:#e8eaf2;font-family:'Space Grotesk',sans-serif;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(108,71,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(108,71,255,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
    nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(8,9,13,0.9);backdrop-filter:blur(16px);border-bottom:1px solid #1e2130;}
    .logo{font-size:20px;font-weight:700;background:linear-gradient(135deg,#6c47ff,#ff4fcb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .badge{font-size:11px;background:rgba(108,71,255,0.15);border:1px solid rgba(108,71,255,0.3);color:#6c47ff;padding:4px 10px;border-radius:20px;}
    .hero{position:relative;z-index:1;text-align:center;padding:60px 24px 40px;}
    .hero h1{font-size:clamp(28px,6vw,52px);font-weight:700;line-height:1.1;margin-bottom:14px;}
    .hero h1 span{background:linear-gradient(135deg,#6c47ff,#ff4fcb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .hero p{font-size:16px;color:#5a5f7a;max-width:400px;margin:0 auto;line-height:1.6;}
    .wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 16px 80px;}
    .card{background:#111318;border:1px solid #1e2130;border-radius:20px;padding:24px;}
    textarea{width:100%;background:#08090d;border:1px solid #1e2130;border-radius:12px;padding:14px;color:#e8eaf2;font-family:'Space Grotesk',sans-serif;font-size:15px;line-height:1.6;resize:none;min-height:120px;outline:none;transition:border-color 0.2s;}
    textarea:focus{border-color:#6c47ff;}
    textarea::placeholder{color:#5a5f7a;}
    .btn{width:100%;margin-top:16px;padding:15px;background:linear-gradient(135deg,#6c47ff,#ff4fcb);border:none;border-radius:12px;color:white;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .btn:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(108,71,255,0.4);}
    .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
    .err{background:rgba(255,79,79,0.08);border:1px solid rgba(255,79,79,0.3);border-radius:10px;padding:14px;color:#ff4f4f;font-size:14px;margin-top:12px;display:none;}
    .err.show{display:block;}
    .credits{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 16px;background:#08090d;border:1px solid #1e2130;border-radius:12px;}
    .c-count{font-size:15px;font-weight:600;color:#22d9a0;font-family:monospace;}
    .c-label{font-size:12px;color:#5a5f7a;}
    .buy{padding:7px 14px;background:rgba(108,71,255,0.12);border:1px solid rgba(108,71,255,0.3);border-radius:8px;color:#6c47ff;font-size:13px;cursor:pointer;}
    .result{margin-top:20px;display:none;}
    .result.show{display:block;}
    .rlabel{font-size:11px;color:#5a5f7a;font-family:monospace;margin-bottom:10px;letter-spacing:1px;}
    .vbox{background:#08090d;border:1px solid #1e2130;border-radius:14px;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .vbox video{width:100%;height:100%;object-fit:cover;border-radius:14px;}
    .loader{display:flex;flex-direction:column;align-items:center;gap:14px;}
    .spin{width:44px;height:44px;border:3px solid #1e2130;border-top-color:#6c47ff;border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .ltext{font-size:13px;color:#5a5f7a;font-family:monospace;}
    .pbar{width:180px;height:3px;background:#1e2130;border-radius:2px;overflow:hidden;}
    .pfill{height:100%;background:linear-gradient(90deg,#6c47ff,#ff4fcb);width:0%;transition:width 0.5s;}
    .drow{display:flex;gap:10px;margin-top:14px;}
    .dlbtn{flex:1;padding:12px;background:linear-gradient(135deg,#6c47ff,#ff4fcb);border:none;border-radius:10px;color:white;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;}
    .shbtn{flex:1;padding:12px;background:rgba(108,71,255,0.12);border:1px solid rgba(108,71,255,0.3);border-radius:10px;color:#6c47ff;font-size:14px;cursor:pointer;}
    .toast{position:fixed;bottom:20px;right:20px;background:#111318;border:1px solid #6c47ff;border-radius:12px;padding:12px 18px;font-size:13px;z-index:999;transform:translateY(60px);opacity:0;transition:all 0.3s;display:flex;align-items:center;gap:8px;}
    .toast.show{transform:translateY(0);opacity:1;}
  </style>
</head>
<body>
<nav>
  <div class="logo">VideoAI.uz</div>
  <div class="badge">BETA v1.0</div>
</nav>
<div class="hero">
  <h1>Matn yozing,<br/><span>Video oling</span></h1>
  <p>AI yordamida professional videolar yarating</p>
</div>
<div class="wrap">
  <div class="card">
    <textarea id="prompt" placeholder="Videoni ingliz tilida yozing... Masalan: A cat sneaks up behind a person and hits them on the head with a stick, funny cartoon style"></textarea>
    <button class="btn" id="btn" onclick="go()">✦ Video Yaratish</button>
    <div class="err" id="err"></div>
    <div class="credits">
      <div><div class="c-label">Mavjud kreditlar</div><div class="c-count" id="cc">10 kredit</div></div>
      <button class="buy">+ Kredit sotib olish</button>
    </div>
    <div class="result" id="result">
      <div class="rlabel">// NATIJA</div>
      <div class="vbox" id="vbox">
        <div class="loader">
          <div class="spin"></div>
          <div class="ltext" id="lt">Tayorlanmoqda...</div>
          <div class="pbar"><div class="pfill" id="pf"></div></div>
        </div>
      </div>
      <div class="drow" id="drow" style="display:none">
        <a class="dlbtn" id="dl" href="#" download="video.mp4">⬇ Yuklab olish</a>
        <button class="shbtn" onclick="share()">↗ Ulashish</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"><span id="ti">✦</span><span id="tm">Tayyor!</span></div>
<script>
let credits=10,videoUrl=null,poll=null;
function toast(m,i='✦'){const t=document.getElementById('toast');document.getElementById('tm').textContent=m;document.getElementById('ti').textContent=i;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function err(m){const e=document.getElementById('err');e.textContent='⚠️ '+m;e.classList.add('show');}
function setP(p,t){document.getElementById('pf').style.width=p+'%';document.getElementById('lt').textContent=t;}
function resetBtn(){const b=document.getElementById('btn');b.disabled=false;b.textContent='✦ Video Yaratish';}

async function go(){
  const prompt=document.getElementById('prompt').value.trim();
  if(!prompt){toast('Prompt yozing!','⚠️');return;}
  if(credits<=0){toast('Kredit yetarli emas!','💎');return;}
  document.getElementById('err').classList.remove('show');
  credits--;
  document.getElementById('cc').textContent=credits+' kredit';
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='⏳ Yaratilmoqda...';
  document.getElementById('result').classList.add('show');
  document.getElementById('drow').style.display='none';
  document.getElementById('vbox').innerHTML='<div class="loader"><div class="spin"></div><div class="ltext" id="lt">So\'rov yuborilmoqda...</div><div class="pbar"><div class="pfill" id="pf"></div></div></div>';
  setP(10,'So\'rov yuborilmoqda...');
  try{
    const r=await fetch('/.netlify/functions/generate-video',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    const d=await r.json();
    if(!r.ok||d.error)throw new Error(d.error||'Server xatosi');
    setP(30,'Video yaratilmoqda...');
    startPoll(d.id);
  }catch(e){err(e.message);resetBtn();credits++;document.getElementById('cc').textContent=credits+' kredit';}
}

function startPoll(id){
  let n=0;
  const msgs=['AI tahlil qilmoqda...','Kadrlar yaratilmoqda...','Video montaj...','Deyarli tayyor...'];
  poll=setInterval(async()=>{
    n++;
    setP(Math.min(30+n*1.5,90),msgs[Math.floor(n/15)%4]);
    try{
      const r=await fetch('/.netlify/functions/check-status?id='+id);
      const d=await r.json();
      if(d.status==='succeeded'&&d.output){
        clearInterval(poll);setP(100,'Tayyor! 🎉');
        const url=Array.isArray(d.output)?d.output[0]:d.output;
        showVideo(url);
      }else if(d.status==='failed'){clearInterval(poll);err('Xato yuz berdi');resetBtn();}
      else if(n>=80){clearInterval(poll);err('Vaqt tugadi');resetBtn();}
    }catch(e){clearInterval(poll);err(e.message);resetBtn();}
  },3000);
}

function showVideo(url){
  videoUrl=url;
  document.getElementById('vbox').innerHTML='<video src="'+url+'" controls autoplay loop style="width:100%;height:100%;border-radius:14px;object-fit:cover"></video>';
  document.getElementById('drow').style.display='flex';
  document.getElementById('dl').href=url;
  toast('Video tayyor! 🎬','✅');
  resetBtn();
}

function share(){if(videoUrl){navigator.clipboard.writeText(videoUrl);toast('Havola nusxalandi!','🔗');}}
</script>
</body>
</html>
